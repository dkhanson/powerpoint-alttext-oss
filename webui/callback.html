<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Callback - PowerPoint Accessibility</title>
    <link rel="stylesheet" href="https://unpkg.com/rivet-core@2.9.0/css/rivet.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f7f7f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .callback-card {
            background: white;
            padding: 3rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #006298;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-message {
            color: #dc3545;
            margin-top: 1rem;
            padding: 1rem;
            background: #fff5f5;
            border-radius: 4px;
            border: 1px solid #ffcdd2;
        }
        .success-message {
            color: #28a745;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="callback-card">
        <div class="spinner"></div>
        <h2>Processing Authentication...</h2>
        <p id="status">Please wait while we complete your login.</p>
        <div id="error" class="error-message" style="display: none;"></div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        // Handle the OAuth callback
        (async function() {
            const statusEl = document.getElementById('status');
            const errorEl = document.getElementById('error');
            
            console.log('=== OAuth Callback Handler Started ===');
            console.log('Current URL:', window.location.href);
            console.log('URL Search (query params):', window.location.search);
            console.log('URL Hash (fragment):', window.location.hash);
            
            // Parse URL parameters from BOTH query string and hash fragment
            const searchParams = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            
            // Combine both sources (hash takes precedence for implicit/hybrid flows)
            const urlParams = new URLSearchParams();
            for (const [key, value] of searchParams) {
                urlParams.set(key, value);
            }
            for (const [key, value] of hashParams) {
                urlParams.set(key, value);
            }
            
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');
            const errorDescription = urlParams.get('error_description');
            const accessToken = urlParams.get('access_token');
            const idToken = urlParams.get('id_token');
            const tokenType = urlParams.get('token_type');
            
            console.log('Received Parameters:');
            console.log('  - code:', code ? code.substring(0, 20) + '...' : 'NOT RECEIVED');
            console.log('  - state:', state ? state.substring(0, 20) + '...' : 'NOT RECEIVED');
            console.log('  - access_token:', accessToken ? 'RECEIVED (length: ' + accessToken.length + ')' : 'NOT RECEIVED');
            console.log('  - id_token:', idToken ? 'RECEIVED (length: ' + idToken.length + ')' : 'NOT RECEIVED');
            console.log('  - token_type:', tokenType || 'NOT RECEIVED');
            console.log('  - error:', error || 'none');
            console.log('  - error_description:', errorDescription || 'none');
            
            // Check if we got ANYTHING
            if (!code && !accessToken && !error) {
                console.error('ERROR: No code, tokens, or error received!');
                console.error('This means the callback URL might be wrong or IU is not redirecting here.');
                statusEl.textContent = 'No response from identity provider';
                errorEl.innerHTML = `
                    <strong>No authentication response received</strong><br>
                    <br>
                    Possible issues:<br>
                    1. Redirect URI mismatch (check IU registration vs config)<br>
                    2. Client ID incorrect<br>
                    3. Authorization request failed before reaching the provider<br>
                    <br>
                    
                    <strong>Current URL:</strong> <code>${window.location.href}</code>
                `;
                errorEl.style.display = 'block';
                document.querySelector('.spinner').style.display = 'none';
                return;
            }
            
            // Check if oidcAuth is available
            if (typeof oidcAuth === 'undefined' || !oidcAuth) {
                console.error('ERROR: oidcAuth not loaded!');
                statusEl.textContent = 'Configuration error';
                errorEl.textContent = 'Authentication module not loaded. Please check your setup.';
                errorEl.style.display = 'block';
                document.querySelector('.spinner').style.display = 'none';
                return;
            }
            
            console.log('oidcAuth object available:', typeof oidcAuth);
            
            try {
                // Handle the callback
                console.log('Calling oidcAuth.handleCallback()...');
                await oidcAuth.handleCallback();
                
                console.log('✓ Callback handled successfully');
                
                // Set flag to trigger UI update on main page
                sessionStorage.setItem('auth_just_completed', 'true');
                
                // Success
                statusEl.textContent = 'Authentication successful! Redirecting...';
                statusEl.className = 'success-message';
                
                // Hide spinner
                document.querySelector('.spinner').style.display = 'none';
                
                // Redirect back to main app
                console.log('Redirecting to main app in 1.5 seconds...');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
                
            } catch (error) {
                console.error('=== Callback Error ===');
                console.error('Error type:', error.constructor.name);
                console.error('Error message:', error.message);
                console.error('Error stack:', error.stack);
                console.error('=====================');
                
                // Show error
                document.querySelector('.spinner').style.display = 'none';
                statusEl.textContent = 'Authentication failed';
                errorEl.innerHTML = `
                    <strong>Error:</strong> ${error.message}<br>
                    <small>Check the browser console (F12) for detailed error information.</small>
                `;
                errorEl.style.display = 'block';
                
                // Provide retry option
                setTimeout(() => {
                    if (confirm('Authentication failed. Would you like to try again?')) {
                        window.location.href = '/';
                    }
                }, 2000);
            }
        })();
    </script>
</body>
</html>
